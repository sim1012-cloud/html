nterLed": "Atmosphere creates sun, new life flowers everywhere + Content Schmetterlinge", "sideLed": "Atmosphere creates sun, new life flowers everywhere + Content Schmetterlinge \n\nover lay chinese subtitle of voice over + Live picture of singers coming in", "sfx": "floor fog still a bit", "offVoice": "Pre recorded on Music Track \n\nAus der Seele meiner Berge wurde eine Stadt, die mehr ist als ein Ort – ein Gefühl.\n我自记忆诞生之前便守望着这片土地。立于群峰之巅，我为这座举世无双的城市注入了生命和灵魂，让她的故事不断跨越时空，回响至今\n\nDort, wo die Isar wie ein silbernes Band durch die Zeit fließt, wo unter alten Kastanien das Lachen der Menschen klingt und wo Schlösser aus Träumen Wirklichkeit geworden sind. Das ist München. Ungezähmt im Herzen. Fein in seiner Seele.\n那里，伊萨尔河清澈流淌；那里，啤酒花园里充满欢声笑语；那里，童话般的城堡成为人们的家园。这就是慕尼黑——内心狂野，外表优雅。\n\nUnd für immer getragen von der Kraft meiner Berge. Doch München strahlt anders. Nicht laut. Nicht grell. Sondern von innen. Hier drängt sich Schönheit nicht auf.\n这座城市承袭着群山的力量，却始终闪耀着与众不同的光芒—不喧嚣，不刺眼，是一种由内而外的力量。在这里，美并不张扬。\n\nSie wächst. Still. Mit Geduld. Mit Würde. Denn alles, was hier entsteht, will nicht nur gesehen werden. \n它生长着，静静地，带着耐心与尊严。因为这里默许一切发生，只为你在不经意间转身回眸。\nEs will gefühlt werden. Wie ein leiser Atemzug aus der Dunkelheit, wie Licht, das sich seinen Weg sucht, wie eine Blüte, die sich nicht öffnet, weil sie muss, sondern weil ihre Zeit gekommen ist. Hier ist Schönheit kein Bild  Sie ist ein Zustand.\n就像黑暗中一缕轻柔的呼吸，一道寻找自我的光，一朵花的绽放，不是因为必然，而是因为时机已到。在这里，美不只是眼前的一幅画——它是一种状态，是生命迎来新篇章的璀璨绽放。\n\nDas ist Bloomin’ Bavaria.\n这就是“绽放的巴伐利亚”。", "hostText": "", "todo": "", "cueList": "_overlay subtitles (bestenfalls fix in Timeline!)\n_spot singers (1:25 rein > 1:33 Einsatz)\n_live cam > singer als overlay reingeben, seitlich im Halbdunkel filmen, dann Schmetterlinge, dann Singer später", "timeSort": 67865, "tags": ["Show"]}, {"sourceRow": 18, "section": "Alpine Opening Show", "pos": "3.5.", "start": "18:52:05", "end": "18:53:00", "duration": "00:00:55", "tc": "", "cueMark": "C", "action": "Chume rk": "", "action": "Voice over on Music Underscore", "description": "The pre recordede Voice Over explains in geramn the Blossom of Classic Part \n\n\nSTBY CALL: Catering for 2. course", "location": "Main Stage Area", "speaker": "", "props": "", "showAct": "female Piano Player in Position", "audio": "Full Playback on Time Code", "lighting": "part of the Audio/ Video Signe", "sniffer": "", "centerLed": "Video Signe Edelweiß, change to new atmosphere, silent movie impression explains voice over \n\n\n+ Chinese Subtitles/ translation of voice over", "sideLed": "Video Signe Edelweiß, change to new atmosphere, silent movie impression explains voice over \n\n\n+ Chinese Subtitles/ translation of voice over", "sfx": "Floor Fog", "offVoice": "Jahrhundertelang habe ich nicht nur mit Stein gebaut. Ich habe mit Klang gemeißelt und mit Licht, das in Marmor erstarrt ist.\n数个世纪以来，我用声音雕刻，用光塑形。\n\nDie stille Symmetrie von Nymphenburg. Das Karmesinleuchten des Cuvilliés-Theaters.\nDas Spiegelzimmer, ein Flüstern aus Gold und Glas. Dies sind keine Monumente.\nSie sind Melodien, die die Zeit vergessen hat zu beenden. In diesen Wänden beschwor Wagner den Sturm aus dem Nichts. \n宁芬堡的壮丽对称结构；库维利耶剧院的绯红光辉。\n镜厅——金色与玻璃互相交融。\n这些并非纪念碑，它们是回荡在时空中、尚未终结的旋律。\n\nHier malten Mozart und Richard Strauss den Himmel mit Sinfonien, die noch heute in der Luft hängen. \n在这里，瓦格纳曾以雷鸣惊醒时代。\n莫扎特与施特劳斯用音符重塑了天空，\n那美妙旋律与这座城市融为一体，等待着与你的久别重逢。\n\nWenn die Musik anschwillt, erwachen meine Mauern. Die Architektur atmet. Bayern entfaltet sich nicht länger nur als Landschaft aus Erde und Wasser, sondern ein Königreich der Poesie, der königlichen Geschichte und des Lichts. \n当音乐响起，巴伐利亚便不再只是一个山川风景，\n而是重塑为了一个由史诗与璀璨文化融合而成的有机体。。\n\nWo die Berge enden, beginnt die Blüte der Klassik und meine Geschichte. Ich bin München. .\n巅峰之上，经典之花绽放，我的故事便由此展开。\n我，就是慕尼黑。", "hostText": "", "todo": "", "cueList": "_STBY CALL: Catering for 2. course \n\n_subitles im content integriert?", "timeSort": 69929, "tags": ["TC", "Dinner", "STBY"]}, {"sour Chinese Subtitles/ translation of voice over", "sfx": "Floor Fog", "offVoice": "Farbe ist nicht stumm. Sie atmet. Sie brennt. Sie hat einen Herzschlag, der tiefer schlägt als jedes Wort. \n我的名字叫颜色。\n我会呼吸，会燃烧。我有心跳，我任何言语都更深沉有力。\n\nNoch ehe die moderne Welt die Augen aufschlug, war ich bereits eine Leinwand, bespannt mit Licht, mit Sehnsucht, mit Zeit.\n在现代世界尚未睁开双眼之前，我早已是一块铺满灵感的画布。\n\nIch versammelte die Alten Meister in meiner Pinakothek und sah, wie sie die Seele meines Volkes in Farbe verwandelten. Doch eine Stadt der Kunst muss ihre eigenen Rahmen sprengen. Ich wurde zur Wiege des Jugendstils.\n我在自己的美术馆中汇聚古今大师，目睹他们将民族的灵魂化为色彩。\n然而，一座艺术之城，必然要打破自身的边界。\n于是，我成为了新艺术风格的摇篮。\n\nUnd im Licht von Schwabing brach der Sturm los. Kandinsky, Marc und Klee malten die Welt nicht nur, sie zertrümmerten sie. \n而在施瓦宾的光影之中，一场声势浩大的突围轰然奏响。\n康定斯基、马尔克与克利，这些先行者拒绝了对世界的平庸复刻，他们以色彩为刃，击碎了旧秩序的轮廓。\n\nSie ließen blaue Pferde laufen und machten meine Stadt zum schlagenden Herzen der modernen Kunst. Eine Stimme wird zum Orchester. Ein Atemzug wird zum Gemälde. \n他们让蓝色的骏马奔跑，使我的城市成为现代艺术跳动的心脏。\n那一刻，艺术在废墟中重获自由。\n\nWo die Farben aufeinanderprallen, beginnt die Blüte der Kunst. Ich bin München.\"\n当色彩彼此碰撞之时，艺术的绽放由此开始。\n我，就是慕尼黑。", "hostText": "", "todo": "", "cueList": "_STBY CALL: Catering for 3. course \n\n_subitles im content integriert?", "timeSort": 72119, "tags": ["TC", "Dinner", "STBY"]}, {"sourceRow": 48, "section": "Blossom of Art", "pos": "6.2.", "start": "20:03:09", "end": "20:48:09", "duration": "00:45:00", "tc": "no", "cueMark": "", "action": "Dinner main course with  keyboard, vocal artist/ beat boxer robeat live music", "description": "with the start of the beat box vocal artist, the main course will be brought in \n\n\nDelivery Catering 2. course", "location": "Main Stage/ Audience Area", "speaker": "", "props": "Podium Robeat", "showAct": "Robeat Live Beat Box and Keyboard mics (1 Peson)", "audio": "Live Beat Box HH mic and Keyboard mics + in ear and connection to show drector", "lighting": "Live Beat Box and Keyboard mics focus", "sniffer": "", "centerLed": "Art Gallery Atmosphere", "sideLed": "Art Gallery Atmosphere", "sfx": "Floor Fog", "offVoice": "", "hostText": "", "todo": "", "cueList": "_ROBEAT + key\n_live cam > tbd in/out\n_Delivery Catering 2. course focus on the VIP Table Catering Parade\n\n\n\n_Change Over to DJ and Jodel Act", "timeSort": 72189, "tags": ["TC", "Dinner", "Speaker"]}], "start": "20:01:39", "end": "20:48:09", "count": 3}, {"title": "Blossom of Nature", "rows": [{"sourceRow": 50, "section": "Blossom of Nature", "pos": "7.", "start": "20:48:09", "end": "20:48:29", "duration": "00:00:20", "tc": "TC 4\n\n02:30:00", "cueMark": "", "action": "Audio/ Video Signe leads into", "description": "The Dinner Parts will be everytime opened up by an Audio Video Signe based on the Edelweiß growing and creating an new atmosphere", "location": "Main Stage Area", "speaker": "", "props": "Change Over Riser from Beatbox to DJ Jodel Act", "showAct": "STBY: Simone und James", "audio": "Full Playback on Time Code", "lighting": "part of the Audio/ Video Signe", "sniffer": "", "centerLed": "Video Signe Edelweiß, change to new atmosphere", "sideLed": "Video Signe Edelweiß, change to new atmosphere", "sfx": "Floor Fog", "offVoice": "", "hostText": "", "todo": "", "cueList": "_TC 4\n_STBY: Simone und James", "timeSort": 74889, "tags": ["TC", "Dinner", "STBY"]}, {"sourceRow": 51, "section": "Blossom of Nature", "pos": "7.1.", "start": "20:48:29", "end": "20:49:39", "duration": "00:01:10", "tc": "", "cueMark": "", "action": "Voice over on Music Underscore", "description": "The pre recordede Voice Over explains in german the Blossom of Art Part", "location": "Main Stage Area", "speaker": "", "props": "", "showAct": "DJ und Yodel Act", "audio": "Full Playback on Time Code", "lighting": "part of the Audio/ Video Signe", "sniffer": "", "centerLed": "Video Signe Edelweiß, change to new atmosphere, silent movie impression explains voice over \n\n\n+ Chinese Subtitles/ translation of voice over", "sideLed": "Video Signe Edelweiß, change to new atmosphere, silent movie impression explains voice over \n\n\n+ Chinese Subtitles/ translation of voice over", "sfx": "Floor Fog", "offVoice": "Bevor ich eine Stadt aus Stein war, war ich ein Wald. Ich war der Fluss. Ich habe das Wilde nicht überbaut. Ich habe es eingeladen.\n\n在我成为一座伟大的城市之前，我曾是森林，曾是河流。\n但是我没有将自然覆盖抹去，而是张开双臂拥抱它。\n\nDie Isar fließt noch immer ungezähmt durch mein Herz, ihre grünen Ufer ein Atemzug mitten im Rauschen der Stadt.\n伊萨尔河依然流淌在我的心中，它那翠绿的河岸，是城市喧嚣中的一份宁静。\nIm Schatten des Englischen Gartens reiten Menschen auf der ewigen Welle des Eisbachs, ein Tanz zwischen Menschengeist und rohem, strömendem Wasser. \n英国花园的绿荫下，藏着一条不安分的河。冲浪者在艾斯巴赫河的冷水里逆流而上——这是人们与这条河之间最原始的舞蹈。\n\nUnd jenseits meiner Tore stehen der Starnberger See und die Alpen —\nstille Wächter, die uns an die älteste Wahrheit erinnern: dass wahre Freiheit in der Natur beginnt.\n城外，是另一番天地。施塔恩贝格湖与群峰静默如初，它们看惯了喧嚣，始终守着一个底色：真正的自由从不是向外索取，而是向内回归自然。在这里，找回你的本色，你就找回了掌控人生的力量。\nWenn dieser uralte Atem auf den Puls von morgen trifft, verblasst das Alte nicht, es verwandelt sich.\n在这里，往日的故事从未落幕，它们正借着新时代的火光，焕发出从未有过的生命力。\nEs wird zur Utopie, wo Natur und Aufbruch als eines tanzen. Folge den Schwingen des Morgens.\n这是自然与理性的交汇点，也是我们重塑自我的起点。天亮了，路就在脚下，出发吧。\nWo die grüne Welt erwacht, beginnt die Blüte der Natur. Ich bin München.\n当绿色的世界苏醒，自然的绽放由此开始。\n我，就是慕尼黑。", "hostText": "", "todo": "", "cueList": "_subitles im content integriert?", "timeSort": 74909, "tags": ["TC"]}, {"sourceRow": 52, "section": "Blossom of Nature", "pos": "7.1.1.", "start": "20:49:39", "end": "20:49:59", "duration": "00:00:20", "tc": "TC 4.2.", "cueMark": "", "action": "Entrance MC's", "description": "3 MC's are entering audience followed by the gimbel cam", "location": "audience area", "speaker": "", "props": "Podium James DJ + Simone first at Audience than walking towards stage", "showAct": "", "audio": "HS 14-16\nentrance Music full playback", "lighting": "Ho low the singer", "sfx": "Floor Fog", "offVoice": "", "hostText": "", "todo": "", "cueList": "_start DJ und Yodel Act\n_live cam > tbd in/out\n_Delivery Catering 3. course focus on the VIP Table Catering Parade\n\n_catering: last round drinks!\n\n_stby: hosts\n_floor fog\n_catering: plates remain - no clean up till the end of main show \n_strike down DJ/ Beat Box table \n_STBY: All Artists for Kini's Dream", "timeSort": 75179, "tags": ["TC", "Host", "Dinner", "Show", "Speaker", "STBY"]}], "start": "20:48:09", "end": "21:07:59", "count": 5}, {"title": "Kini's Dream Host Announcement", "rows": [{"sourceRow": 56, "section": "Kini's Dream Host Announcement", "pos": "8.0.", "start": "21:07:59", "end": "21:08:19", "duration": "00:00:20", "tc": "TC 4.1.", "cueMark": "", "action": "Entrance MC's", "description": "3 MC's are entering stage from left and right side (male + female)", "location": "Main Stage Area", "speaker": "", "props": "strike down DJ/ Beat Box table", "showAct": "", "audio": "HS 14-16\nentrance Music full playback", "lighting": "Host entrance", "sniffer": "", "centerLed": "Transition into Kini's Dream // Edelweiß Tranistion", "sideLed": "Transition into Kini's Dream // Edelweiß Tranistion", "sfx": "", "offVoice": "", "hostText": "", "todo": "", "cueList": "_content change + Jingle NN\n_hosts + spots + live cam", "timeSort": 76079, "tags": ["TC", "Host"]}, {"sourceRow": 57, "section": "Kini's Dream Host Announcement", "pos": "8.", "start": "21:08:19", "end": "21:10:19", "duration": "00:02:00", "tc": "no", "cueMark": "", "action": "", "description": "The hosts are entering the stage from different sides and areas while adressing the story of Kini's dream to the audience. They assemble with the final words on stage and the show starts.\n\n\nshall we stopp drink delivery during main show", "location": "Main Stage/ Audience Area", "speaker": "Host 1 - 3", "props": "Set Up drum und percussion riser 1 - 3\n\n- maybe piano riser back on stage", "showAct": "STBY: All Artists for Kini's Dream", "audio": "Hand helds 14-16 \n+ Back Up Hand Held for Hosts \n\nAudio Loop from Audio Signe (1.30 min)", "lighting": "Light Fokus on the 3 Hosts, they are coming in from different positions and assemble on stage", "sniffer": "", "centerLed": "Kinis Face as Pop Art Painting creates a collage based on the text description, framed as Loop", "sideLed": "Built into the Neuschwanstein Atmosphere or the La Grotta \n\n\nChinese Titel of Show \n巅峰的回响", "sfx": "Built into the Neuschwanstein Atmosphere or the La Grotta", "offVoice": "", "hostText": "Femal Host 1: \nLadies and gentlemen, tonight you have seen Munich bloom. You have heard its music, felt its art, and breathed its nature. But to truly understand the soul of this city, you must understand one man.\n\nMale Host: \nHere in Munich he is called Kini. King Ludwig the Second.\nIf you travel the world, you might know him as the 'Fairy-Tale King‘,  the man who built Neuschwanstein, the castle that inspired Disney. But here in Bavaria, he was so much more than a dreamer. He was a visionary.\nWhile others fought wars, Kini built palaces of art. He was the ultimate patron, rescuing Richard Wagner from ruin and turning Munich into the music capital of Europe. But he was also a pioneer of the future. Did you know his castles had the first electricity, the first central heating, and the first telephones in Bavaria?\n\nFemale Host 2: \nHe lived at night, riding through the snow in a sleigh illuminated by the world's first electric lightbulbs. He didn't just want to rule a country; he wanted to elevate the human spirit through beauty, technology, and art.\nHe gave Munich its mindset: a deep respect for tradition, paired with a fearless drive for innovation.\nTonight, we do not just celebrate his history. We step into his vision. \nListen to his thoughts, \n\nAll 3 Hosts together: \nand follow his dream.", "todo": "", "cueList": "_Content: kini\n_translation for hosts\n\n\n_parall: Aufbau riser perc + drums (tbd)\n\n\n\n\n\n\n\n\n\n\n\n\n\n_stby: Twiolins (Violin Duo), 2 Singers Male/ female, female piano player + all Butterflies", "timeSort": 76099, "tags": ["TC", "Host", "Show", "STBY"]}], "start": "21:07:59", "end": "21:10:19", "count": 2}, {"title": "Kini's Dream/ Main Show - The inspring power and beauty of nature „The Swan“", "rows": [{"sourceRow": 59, "section": "Kini's Dream/ Main Show - The inspring power and beauty of nature „The Swan“", "pos": "9.", "start": "21:10:19", "end": "21:10:59", "duration": "00:00:40", "tc": "TC 5\n\n03:00:00", "cueMark": "", "action": "Show Start/ Short Thunder Introduction", "description": "The Thunder opens up the scene with light and video like a brain impulse of Kini himself \n\nDuring the same time to singers, a piano player and the twiolins are enterijng the stage from different sides", "location": "Main Stage", "speaker": "", "props": "", "showAct": "Twiolins (Violin Duo), 2 Singers Male/ female, female piano player\n\nall Butterflies", "audio": "halfplayback with \nClick track and time code", "lighting": "Thunder/ weather lightng", "sniffer": "", "centerLed": "Weather lighting and thunder", "sideLed": "Weather lighting and thunder", "sfx": "", "offVoice": "", "hostText": "", "todo": "", "cueList": "_TC 5\n\n_Twiolins (Violin Duo), 2 Singers Male/ female, female piano player\n_all Butterflies \n_stby: dancers\n_live cam: singer (0:25 start)", "timeSort": 76219, "tags": ["TC", "Show", "STBY"]}, {"sourceRow": 60, "section": "Kini's Dream/ Main Show - The inspring power and beauty of nature „The Swan“", "pos": "9.1.", "start": "21:10:59", "end": "21:12:09", "duration": "00:01:10", "tc": "", "cueMark": "S", "action": "Music Hummin Chume and Voice Over in german", "description": "2 Singers entering the Stage + voice over pre recorded is explaining the scene", "location": "Main Stage Area", "speaker": "", "props": "", "showAct": "2 Singers Male/ female, female piano player (takes place), Twiolins (Violin Duo)\n\nall Butterflies", "audio": "HH Mics and In Ear for Singers (2), Violins (2), In ear for Piano player female (1), halfplayback with \nClick track and time code", "lighting": "Atmosphere inspring nature moment to create creativity", "sniffer": "", "centerLed": "Nature, Water, Butterflies, Neuschwanstein, La Grotta,\n\n maybe quote of Kini written in chinese\n\nChinese Subtitles/ translation of voice over\n\nQuote\n“我愿永远成为一个谜，对自己亦对他人。+ Subtitles", "sideLed": "Nature, Water, Butterflies, Neuschwanstein, La Grotta", "sfx": "Butterflies all 5 \n\nFloor Fog", "offVoice": "Sie nannten mich einen Träumer. Sie nannten mich wahnsinnig. Weil ich mich weigerte, meine Macht in den kalten Hallen der Politik zu suchen. Ich fand sie hier. In der ungezähmten Natur.\n他们称我为梦想家，也称我为疯子。\n只因我拒绝在冰冷的政治殿堂中寻求权力。\n我在这里找到了它——在这未被驯服的自然之中。\n\nBlau und Weiß. Für sie ist es nur eine Fahne. Für mich ist es der endlose bayerische Himmel. Es ist das Wasser der Alpen. Es ist die Luft, die ich zum Atmen brauche.\n蓝与白,对他人而言，那不过是一面旗帜。\n而对我来说，那是无尽的巴伐利亚天空，\n是阿尔卑斯山奔涌而来的河流，\n是我赖以呼吸的空气。\n\nWenn der Hof zur Jagd ausritt, suchten sie nach einer Trophäe. Ich suchte den Wald selbst. Wenn die Welt zu laut wurde, betrachtete ich den Schwan. \n别人在林间追逐猎物，而我在荒野中找寻出口。与其在喧嚣里狂欢，我更愿意凝望湖面上的天鹅。\n\nDer Schwan lehrte mich, dass wahre Schönheit der Einsamkeit bedarf. Ich wollte die Zukunft errichten. \n天鹅教会我：真正的美，需要孤独来滋养。\n超越时代的愿景则可以永恒。\nIch blickte auf die neuen Maschinen, die frühen Fahrräder, die Räder des Fortschritts, und ich sah die Freiheit. \n很多人只看到了冰冷的钢铁，我却在其中看见了自由的可能。\n\nAlles ist ein Kreislauf. Wie die Glocken der Frauenkirche, die über München erklingen. Wie die Figuren des Glockenspiels, die ihren ewigen Reigen der Erneuerung und Hoffnung tanzen. \n听，慕尼黑圣母教堂的钟声从未改变，但时代早已换了节拍。\n如同钟琴中的人物，在永恒的更迭中舞蹈旋转。\n\nDie alte Welt, die sich in die neue wandelt.\n旧的秩序正在瓦解，新的可能正在生长。\n\nWie der Schmetterling, so muss sich eine Vision verwandeln. Ich wollte in dieser Welt nicht bloß leben; ich wollte sie erheben.\nKannst du das spüren?\n就像那只冲破泥土的蝴蝶，一个愿景想要落地生根，就必须经历这种脱胎换骨的蜕变。", "hostText": "", "todo": "", "cueList": "_1:19 solist voc start\n_subtitles > automatisch?\n\n_dancers\n_butterflies\n\n_floor fog: mehr/weniger?", "timeSort": 76259, "tags": ["TC", "Show"]}, {"sourceRow": 61, "section": "Kini's Dream/ Main Show - The inspring power and beauty of nature „The Swan“", "pos": "9.2.", "start": "21:12:09", "end": "21:13:59", "duration": "00:01:50", "tc": "no", "cueMark": "C/ S", "action": "Schwanen Song with dancers, 1 Singer, Violins and piano player", "description": "The stage is bathed in deep royal blue and pure white. The musicians, dressed as wind and water, begin to play the yearning notes of 'Chume, Chume' and Mendelssohn’s 'Schwanenlied'. The dancers move like swans. The Blue Butterfly flutters across the stage. Kini speaks from within.", "location": "Main Stage Area", "speaker": "", "props": "", "showAct": "Twiolins (Violin Duo), 1 Singers female, female piano player", "audio": "Piano, female singer HH Mic (1) + violins (2),  halfplayback with \nClick track and time code", "lighting": "focus on musican and dancers", "sniffer": "", "centerLed": "Nature, Water, Butterflies, Neuschwanstein, La Grotta\n\nmaybe live cam with content effects\n\nchinese subtitles for the song to follow\n\nEs singt ein Schwan im Weiher,\nUnd rudert auf und ab,\nUnd immer leiser singend,\nTaucht er ins Flutengrab.\n天鹅歌唱在池塘，\n拨动红掌上下动，\n歌声越唱越动听，\n翻身潜入湖水中。\nEs ist so still und dunkel,\nVerweht ist Blatt und Blüt’,\nDer Stern ist knisternd zerstoben,\nVerklungen das Schwanenlied.\n如此寂静与黑暗，\n树叶鲜花皆飘零，\n星辰呼啸分散去，\n天鹅之歌也无声。\nDer Stern ist knisternd zerstoben,\nVerklungen das Schwanenlied.\n星辰呼啸分散去，\n天鹅之歌也无声。", "sideLed": "Nature, Water, Butterflies, Neuschwanstein, La Grotta\n\nmaybe live cam with content effects", "sfx": "", "offVoice": "", "hostText": "", "todo": "", "cueList": "_subitles song?\n\n_llive cam with content effects?\n\n\n\n\n_violins nach vorne ins Pub, erst nach Karl Jenkins ab\n\n\n_Song Text muss einzelnd gecued w const DATA=JSON.parse(document.getElementById('data').textContent);const tags=['Show','Host','Speaker','Dinner','TC','STBY'];let state={q:'',tag:'All'};const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const slug=s=>s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
function textOf(r){return Object.values(r).join(' ').toLowerCase()} function pill(text,cls=''){return text?`<span class="pill ${cls}">${esc(text)}</span>`:''}
function renderChips(){const root=document.getElementById('chips');root.innerHTML=`<button class="chip active" data-tag="All">All</button>`+tags.map(t=>`<button class="chip" data-tag="${t}">${t}</button>`).join('');root.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{state.tag=b.dataset.tag;root.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));b.classList.add('active');filter();})}
function render(){document.getElementById('nav').innerHTML='<h3>Sections</h3>'+DATA.sections.map(s=>`<a href="#${slug(s.title)}">${esc(s.title)}<span>${esc(s.start||'')}${s.end?' → '+esc(s.end):''} · ${s.count} rows</span></a>`).join('');document.getElementById('flow').innerHTML=DATA.sections.map(s=>`<section class="section" id="${slug(s.title)}"><div class="section-head"><div><h3>${esc(s.title)}</h3><p>${esc(s.start||'')}${s.end?' → '+esc(s.end):''}</p></div><div class="count">${s.count} flow rows</div></div>${s.rows.map(r=>rowHtml(r)).join('')}</section>`).join('');filter();}
function rowHtml(r){const meta=[pill(r.location,'blue'),pill(r.speaker,'green'),pill(r.duration?'Duration '+r.duration:'','gold'),pill(r.tc?'TC '+r.tc:'','red'),...(r.tags||[]).map(t=>pill(t,t==='Show'?'red':t==='Dinner'?'gold':t==='Host'?'green':t==='Speaker'?'blue':'lav'))].join('');return `<article class="row" data-tags="${esc((r.tags||[]).join(' '))}" data-text="${esc(textOf(r))}"><div class="time"><b>${esc(r.start||'--:--')}</b><span>${r.end?esc(r.end):'End TBD'}${r.duration?' · '+esc(r.duration):''}<br>${r.pos?'Pos. '+esc(r.pos):'No pos.'}</span></div><div class="content"><div class="topline"><div class="title">${esc(r.action||'Untitled flow item')}</div><div class="pos">Row ${r.sourceRow}</div></div><p class="desc">${esc(r.description||'')}</p><div class="meta">${meta}</div><details><summary>Production details</summary><div class="details">${field('Props',r.props)}${field('Show Act',r.showAct)}${field('Audio',r.audio)}${field('Lighting',r.lighting)}${field('LED / Screen',join([r.centerLed,r.sideLed]))}${field('SFX / Kinetic',r.sfx)}${field('Off Voice / Host Text',join([r.offVoice,r.hostText]))}${field('To Do / Cue List',join([r.todo,r.cueList]))}</div></details></div></article>`}
function join(arr){return arr.filter(Boolean).join('\n')} function field(label,value){return `<div class="field"><label>${esc(label)}</label><div>${value?esc(value):'<span class="empty">-</span>'}</div></div>`}
function filter(){const q=state.q.trim().toLowerCase();document.querySelectorAll('.row').forEach(row=>{const okQ=!q||row.dataset.text.includes(q);const okT=state.tag==='All'||row.dataset.tags.includes(state.tag);row.classList.toggle('hidden',!(okQ&&okT));});document.querySelectorAll('.section').forEach(sec=>{sec.classList.toggle('hidden',sec.querySelectorAll('.row:not(.hidden)').length===0)})}
document.getElementById('search').addEventListener('input',e=>{state.q=e.target.value;filter();});renderChips();render();
